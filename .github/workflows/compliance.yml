
name: Code Quality & Compliance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check formatting with Prettier
        working-directory: backend
        run: npm run format:check

      - name: Lint with ESLint
        working-directory: backend
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  prisma:
    name: Database Schema Validation
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:password@localhost:5432/db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Validate Prisma schema
        working-directory: backend
        run: npx prisma validate

  docs-sync:
    name: Documentation Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build changed file list
        id: changed_files
        run: |
          BASE_REF="${{ github.base_ref || github.event.repository.default_branch }}"
          git fetch origin "$BASE_REF" --depth=1
          git diff --name-only "origin/$BASE_REF...HEAD" > /tmp/changed_files.txt
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"

      - name: Check if routes changed
        id: routes_changed
        run: |
          if grep -qE '^backend/src/routes/' /tmp/changed_files.txt; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if docs updated when routes changed
        if: steps.routes_changed.outputs.changed == 'true'
        run: |
          if grep -qE '^docs/' /tmp/changed_files.txt; then
            echo "✅ Routes changed and docs updated"
            exit 0
          else
            echo "❌ ERROR: Routes changed but docs NOT updated"
            echo "Please update docs/ files when changing API routes"
            exit 1
          fi

      - name: Check if schema changed
        id: schema_changed
        run: |
          if grep -qE '^backend/prisma/schema.prisma' /tmp/changed_files.txt; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if migration added when schema changed
        if: steps.schema_changed.outputs.changed == 'true'
        run: |
          if grep -qE '^backend/prisma/migrations/' /tmp/changed_files.txt; then
            echo "✅ Schema changed and migration created"
            exit 0
          else
            echo "❌ ERROR: Schema changed but NO MIGRATION created"
            echo "Run: npx prisma migrate dev --name <migration_name>"
            exit 1
          fi

      - name: Check if datenbankschema.md updated when schema changed
        if: steps.schema_changed.outputs.changed == 'true'
        run: |
          if grep -qE '^docs/datenbankschema.md' /tmp/changed_files.txt; then
            echo "✅ Schema changed and docs/datenbankschema.md updated"
            exit 0
          else
            echo "⚠️  WARNING: Schema changed but docs/datenbankschema.md NOT updated"
            echo "Consider updating database documentation"
          fi

      - name: Check if release-relevant files changed
        id: release_changed
        run: |
          if grep -qE '^backend/(src|public/script|prisma|scripts)/' /tmp/changed_files.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce package version bump for release-relevant changes
        if: steps.release_changed.outputs.changed == 'true'
        run: |
          BASE_REF="${{ steps.changed_files.outputs.base_ref }}"

          BASE_VERSION=$(git show "origin/$BASE_REF:backend/package.json" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>process.stdout.write(JSON.parse(d).version||''));")
          HEAD_VERSION=$(node -e "const fs=require('fs');process.stdout.write(JSON.parse(fs.readFileSync('backend/package.json','utf8')).version||'');")

          if [ -z "$BASE_VERSION" ] || [ -z "$HEAD_VERSION" ]; then
            echo "❌ ERROR: Could not read backend/package.json version"
            exit 1
          fi

          echo "Base version: $BASE_VERSION"
          echo "Head version: $HEAD_VERSION"

          if [ "$BASE_VERSION" = "$HEAD_VERSION" ]; then
            echo "❌ ERROR: Release-relevant changes detected, but backend/package.json version was not bumped."
            echo "Please run one of: npm version patch | npm version minor | npm version major (in backend/)"
            exit 1
          fi

          if ! grep -qE '^backend/package-lock.json$' /tmp/changed_files.txt; then
            echo "❌ ERROR: backend/package.json version changed, but backend/package-lock.json was not updated."
            echo "Please run npm install or npm version in backend/ and commit backend/package-lock.json."
            exit 1
          fi

          LOCK_VERSION=$(node -e "const fs=require('fs');const l=JSON.parse(fs.readFileSync('backend/package-lock.json','utf8'));process.stdout.write(l.version||'');")
          if [ "$HEAD_VERSION" != "$LOCK_VERSION" ]; then
            echo "❌ ERROR: Version mismatch between backend/package.json ($HEAD_VERSION) and backend/package-lock.json ($LOCK_VERSION)."
            exit 1
          fi

          echo "✅ Version bump check passed."
          echo "::notice::Remember to create/update a changelog entry with version $HEAD_VERSION in the app changelog UI."

  summary:
    name: Compliance Check Summary
    runs-on: ubuntu-latest
    needs: [lint, test, prisma, docs-sync]
    if: always()
    steps:
      - name: Check all checks passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.prisma.result }}" != "success" ] || \
             [ "${{ needs.docs-sync.result }}" != "success" ]; then
            echo "❌ Some checks failed. See details above."
            exit 1
          fi
          echo "✅ All compliance checks passed"
